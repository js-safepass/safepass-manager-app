      tags:
        - Visits
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: A page of raw tracking solves.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      description: Provisional tracking-solve shape.
                      additionalProperties: true
                  meta:
                    $ref: '#/components/schemas/PageMeta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /visits/{id}/tracking/trace:
    x-apps:
      - mapping
    parameters:
      - name: id
        in: path
        required: true
        description: Visit id.
        schema:
          type: string
    get:
      operationId: getVisitTrackingTrace
      summary: Get a decimated tracking trace for map rendering
      description: Server-decimated polyline of the visit's path, sized for map rendering. Response shape is PROVISIONAL — to be tightened against the trace model.
      tags:
        - Visits
      parameters:
        - name: target_points
          in: query
          description: Desired number of points after server-side decimation.
          schema:
            type: integer
        - name: agg
          in: query
          description: Aggregation used when collapsing points.
          schema:
            type: string
            enum:
              - median
              - mean
      responses:
        '200':
          description: A decimated trace (provisional shape).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
                additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /devices/{id}/tracking/latest:
    x-apps:
      - mapping
    parameters:
      - name: id
        in: path
        required: true
        description: Device id.
        schema:
          type: string
    get:
      operationId: getDeviceTrackingLatest
      summary: Get a device's latest tracking solve
      description: Most recent position solve for the device. Response shape is PROVISIONAL — to be tightened against the tracking model.
      tags:
        - Devices
      responses:
        '200':
          description: Latest solve (provisional shape).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    cognitoBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Cognito User Pool access token in `Authorization: Bearer <jwt>`. Primary auth for the web app and most authenticated endpoints.'
    otpSession:
      type: apiKey
      in: header
      name: X-Otp-Session
      description: 'OTP session from `POST /v1/auth/otp/verify`. May alternatively be sent as `Authorization: Bearer otp:<session>`.'
  schemas:
    WhoAmI:
      type: object
      title: WhoAmI
      description: The authenticated principal and its resolved access. `assignments`, `scope_identity`, and `effective_permissions` are typed loosely here and will be tightened to concrete schemas before build start.
      required:
        - user_id
        - principal
        - org_ids
      properties:
        user_id:
          type: string
          description: Principal id. API-token principals are prefixed `token:`.
          examples:
            - user_01H9...
        email:
          type: string
          format: email
        principal:
          type: string
          description: Whether the caller authenticated as a user or an org API token.
          enum:
            - user
            - api_token
        org_ids:
          type: array
          description: Organizations the principal has an assignment in.
          items:
            type: string
        membership_org_ids:
          type: array
          description: Org membership from request context, when available (else empty).
          items:
            type: string
        assignments:
          type: array
          description: Role/scope assignments backing the resolved permissions.
          items:
            type: object
            additionalProperties: true
        scope_identity:
          type: object
          description: Resolved scope identity (label + class + identifiers).
          additionalProperties: true
        scope_label:
          type: string
        scope_class:
          type: string
        effective_permissions:
          type: object
          description: Permission set resolved from assignments against role thresholds.
          additionalProperties: true
        membership_version:
          type: string
          description: Opaque version of the principal's membership; changes invalidate cached auth state.
        evaluated_at:
          type: string
          format: date-time
          description: When this principal snapshot was evaluated (RFC3339, UTC).
    WhoAmIEnvelope:
      type: object
      title: WhoAmIEnvelope
      description: Standard `{ data }` success envelope wrapping a WhoAmI payload.
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/WhoAmI'
    Problem:
      type: object
      title: Problem
      description: RFC 7807-style error response. Every error body uses this shape. `code` is a stable, machine-readable string clients branch on;
      required:
        - title
        - status
        - code
      additionalProperties: true
      properties:
        title:
          type: string
          description: Short, human-readable summary of the problem type.
          examples:
            - Unauthorized
        status:
          type: integer
          format: int32
          description: HTTP status code, echoed in the body.
          examples:
            - 401
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence.
          examples:
            - Authentication required.
        code:
          type: string
          description: Stable machine-readable error code. Lowercase for the pagination contract (e.g. `invalid_sort`, `cursor_sort_mismatch`, `invalid_limit`); uppercase for legacy domain codes (e.g. `UNAUTHORIZED`, `FORBIDDEN`, `NOT_FOUND`, `INVALID_FILTER`).
          examples:
            - UNAUTHORIZED
    ScopeTree:
      type: object
      title: ScopeTree
      description: Nested org scope tree (organization -> divisions -> locations -> buildings -> zones/floors) used to render scope pickers. Shape is provisional and will be tightened before build start.
      additionalProperties: true
    MediaUploadRequest:
      type: object
      title: MediaUploadRequest
      description: Request a pre-signed upload slot for a media asset.
      required:
        - asset_type
        - content_type
      properties:
        asset_type:
          type: string
          description: Logical asset class (e.g. visitor_photo, company_logo, badge_template_asset).
        content_type:
          type: string
          description: MIME type of the file to be uploaded (e.g. image/jpeg).
        org_id:
          type: string
          description: Organization to own the asset (may be inferred from the principal).
    MediaUpload:
      type: object
      title: MediaUpload
      description: Pre-signed upload slot (dto.MediaUploadOut). PUT the bytes to `upload_url` with the given `headers`, then call the complete endpoint with `media_id`.
      required:
        - media_id
        - upload_url
        - expires_at
      properties:
        media_id:
          type: string
        upload_url:
          type: string
          format: uri
        headers:
          type: object
          description: Headers that must be sent on the PUT to the presigned URL.
          additionalProperties:
            type: string
        expires_at:
          type: string
          format: date-time
    MediaUploadEnvelope:
      type: object
      title: MediaUploadEnvelope
      description: '`{ data }` envelope wrapping a MediaUpload slot.'
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/MediaUpload'
    MediaAsset:
      type: object
      title: MediaAsset
      description: A media asset record (dto.MediaAssetOut). `url` is a signed read URL, present once READY.
      required:
        - id
        - org_id
        - asset_type
        - status
        - created_at
        - updated_at
      properties:
        id:
          type: string
        org_id:
          type: string
        owner_user_id:
          type: string
        asset_type:
          type: string
        status:
          type: string
          description: 'Lifecycle: e.g. pending -> READY.'
        content_type:
          type: string
        url:
          type: string
          format: uri
          description: Signed read URL; present once the asset is READY.
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    MediaAssetEnvelope:
      type: object
      title: MediaAssetEnvelope
      description: '`{ data }` envelope wrapping a MediaAsset.'
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/MediaAsset'
    User:
      type: object
      title: User
      description: A user identity (dto.UserOut). Users can belong to multiple orgs, so `organization_id` is an array. Lifecycle + retention fields track the deactivate -> archive -> purge flow.
      required:
        - id
        - organization_id
        - email
        - first_name
        - last_name
        - roles
        - otp_required
        - sms_opted_out
        - host_notifications_opted_out
        - lifecycle_status
        - version
        - created_at
        - updated_at
      properties:
        id:
          type: string
        organization_id:
          type: array
          description: Orgs this user belongs to (multi-org).
          items:
            type: string
        division_ids:
          type: array
          items:
            type: string
        location_ids:
          type: array
          items:
            type: string
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        avatar_media_id:
          type: string
        avatar_url:
          type: string
          description: Signed URL when an avatar is attached.
        roles:
          type: array
          items:
            type: string
        otp_required:
          type: boolean
        phone:
          type: string
        phone_e164:
          type: string
        notification_channel:
          type: string
        sms_opted_out:
          type: boolean
        host_notifications_opted_out:
          type: boolean
        sms_consent_status:
          type: string
        sms_consent_state:
          type: string
        sms_consent_at:
          type: string
          format: date-time
        meta:
          type: object
          additionalProperties: true
        lifecycle_status:
          type: string
          description: e.g. active, deactivated, archived.
        deactivated_at:
          type: string
          format: date-time
        archived_at:
          type: string
          format: date-time
        recoverable_until:
          type: string
          format: date-time
        purge_after_at:
          type: string
          format: date-time
        retention_override_by:
          type: string
        retention_override_reason:
          type: string
        retention_override_at:
          type: string
          format: date-time
        scope_identity:
          type: object
          additionalProperties: true
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UserEnvelope:
      type: object
      title: UserEnvelope
      description: '`{ data }` envelope wrapping a single User.'
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/User'
    UpdateMeRequest:
      type: object
      title: UpdateMeRequest
      description: Self-service update of the calling user's profile. Editable field set is PROVISIONAL — to be tightened against PatchMe.
      properties:
        first_name:
          type: string
        last_name:
          type: string
        phone:
          type: string
        country_code:
          type: string
        notification_channel:
          type: string
        avatar_media_id:
          type: string
        meta:
          type: object
          additionalProperties: true
    UserSettings:
      type: object
      title: UserSettings
      description: Per-user UI/preference settings (dto.UserSettingsOut).
      required:
        - theme
        - timezone_display
        - version
        - created_at
        - updated_at
      properties:
        theme:
          type: string
        timezone_display:
          type: string
        user_timezone:
          type: string
        flags:
          type: object
          additionalProperties: true
        meta:
          type: object
          additionalProperties: true
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UserSettingsUpdateRequest:
      type: object
      title: UserSettingsUpdateRequest
      description: Update per-user settings (dto.UserSettingsIn). All fields optional.
      properties:
        theme:
          type: string
        timezone_display:
          type: string
        user_timezone:
