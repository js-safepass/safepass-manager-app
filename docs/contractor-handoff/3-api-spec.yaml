          description: |-
            Notification type slug, following the `host.<event>` convention. Known values include `host.visitor_arrived`, `host.checkin_failed`, and `host.geofence_breach`. The set is open — treat unknown slugs gracefully.

            `host.geofence_breach` (severity `warning`) is emitted on a geofence `exit` transition when the feature's `notify_on_breach` is true and the visit has a `host_user_id`; its `payload` is a `GeofenceEventPayload`.
