      - name: id
        in: path
        required: true
        description: Visitor id.
        schema:
          type: string
    post:
      operationId: checkInVisitor
      summary: Check in a visitor
      description: One-call front-desk check-in for a selected visitor. The server consumes the visitor's closest matchable scheduled visit if one exists, otherwise creates an ad-hoc visit, runs the check-in gates, optionally attaches a photo, and enqueues the badge render/encode pipeline. Returns `202` with the queued visit; progress is async via the visit's `checkin_status`. A matched scheduled visit keeps its pre-arranged host, so `host_*` fields apply only to the ad-hoc fallback path. `Idempotency-Key` is REQUIRED.
      tags:
        - Visits
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          description: Idempotency key; required so retries are safe.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckInRequest'
      responses:
        '202':
          description: Check-in accepted and queued; the updated visit is returned with `checkin_status=queued` and a `job_id`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitEnvelope'
        '400':
          description: Invalid body, missing required field, or host resolution failure. `code` ∈ { IDEMPOTENCY_REQUIRED, BAD_JSON, ORG_MISMATCH, LOCATION_REQUIRED, BUILDING_REQUIRED, HOST_RESOLUTION_FAILED, MEDIA_INVALID, MEDIA_READ_FAILED, PHOTO_ATTACH_FAILED, BAD_REQUEST }.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: A check-in blocker is active or an inline host contact conflicts. `code` ∈ { VISITOR_ARCHIVED, VISITOR_CHECKIN_IN_PROGRESS, VISITOR_ALREADY_CHECKED_IN, NO_AVAILABLE_BADGES, HOST_CONTACT_CONFLICT }.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '422':
          description: The attached check-in photo failed face validation. `code` ∈ { FACE_INDEX_NO_FACE, FACE_INDEX_QUALITY_TOO_LOW, FACE_INDEX_UNSUPPORTED_IMAGE, FACE_INDEX_FAILED }. Multiple faces are NOT blocking (the highest-confidence face is used).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '428':
          description: A precondition must be satisfied first. `code` ∈ { REVIEW_REQUIRED, BACKGROUND_CHECK_REQUIRED, VISITOR_NOT_AVAILABLE }.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '429':
          description: Per-location check-in queue is at capacity (`CHECKIN_QUEUE_FULL`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '500':
          description: Server failed to create, enqueue, or update the check-in. `code` ∈ { INTERNAL, CHECKIN_ENQUEUE_FAILED, CHECKIN_UPDATE_FAILED }.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '503':
          description: A dependency is unavailable. `code` ∈ { CHECKIN_UNAVAILABLE, PHOTO_ATTACH_UNAVAILABLE }.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
