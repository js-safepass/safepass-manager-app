        - updated_at
      properties:
        id:
          type: string
        organization_id:
          type: string
        division_id:
          type: string
        external_key:
          type: string
        name:
          type: string
        slug:
          type: string
        logo_media_id:
          type: string
        status:
          type: string
        address_line1:
          type: string
        address_line2:
          type: string
        city:
          type: string
        state:
          type: string
        postal_code:
          type: string
        country:
          type: string
        timezone:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        geo_source:
          type: string
        geo_updated_at:
          type: string
          format: date-time
        meta:
          type: object
          additionalProperties: true
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Building:
      type: object
      title: Building
      description: A structure within a location (dto.BuildingOut). Used for responses and create/update bodies.
      required:
        - id
        - organization_id
        - location_id
        - name
        - slug
        - status
        - version
