        '200':
          description: All gates pass; check-in may currently proceed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckInPreflightResponse'
        '400':
          description: Invalid body or missing required field. `code` ∈ { BAD_JSON, ORG_MISMATCH, LOCATION_REQUIRED, BUILDING_REQUIRED, BAD_REQUEST }.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: A check-in blocker is active. `code` ∈ { VISITOR_ARCHIVED, VISITOR_CHECKIN_IN_PROGRESS, VISITOR_ALREADY_CHECKED_IN, NO_AVAILABLE_BADGES }.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Problem'
        '428':
          description: A precondition must be satisfied first. `code` ∈ { REVIEW_REQUIRED, VISITOR_NOT_AVAILABLE }.
