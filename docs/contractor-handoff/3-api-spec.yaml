openapi: 3.1.0
info:
  title: SafePass Client Apps API (Visitor Management + Mapping)
  version: 1.0.0
  summary: Subset of the SafePass API covering the operations the Visitor Management and Mapping client apps perform.
  description: |-
    A focused subset of the SafePass API contract containing only the operations the Visitor Management and Mapping apps perform. Administration, kiosk, and other internal surfaces are excluded.
    Each path carries an `x-apps` marker: `visitor` (Visitor Management), `mapping` (Mapping), or `shared` (both apps).
    Response shapes explicitly marked PROVISIONAL (the metrics group, the auth scope/one-time-code group, and the scope tree) will be frozen before build start; all other shapes are stable and live.
  contact:
    name: SafePass Platform
    email: jonathan.sargent@safepass.com
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary
servers:
  - url: https://api.safepass.com/v1
    description: Production
security:
  - cognitoBearer: []
tags:
  - name: Auth
    description: Principal resolution (whoami), permission-scope introspection, and one-time-code re-verification (shapes provisional).
  - name: Organizations
    description: Organization scope tree for scope pickers.
  - name: Media
    description: Pre-signed media uploads (visitor photos, floorplan images).
  - name: Users
    description: The signed-in user's own profile, avatar, and settings.
  - name: Org Hierarchy
    description: Divisions, locations, buildings (read-only in these apps).
  - name: Devices
    description: Read-only device and station state (badges, readers, stations) for status displays and station selection.
  - name: Visitors
    description: Visitor records (org-scoped), photos, and face enrollment.
  - name: Visits
    description: Visit lifecycle — scheduling, check-in/out, badge assignment, and events.
  - name: Host Contacts
    description: Host-contact directory reads and suggestions. Hosts are attached (and created via dedupe-guarded upsert) inline on visitor / visit / check-in requests.
  - name: Notifications
    description: User notifications — list, SSE stream, and read-state.
  - name: Metrics
    description: Operational dashboard metrics and timeseries (response shapes provisional).
  - name: Badge Swipes
    description: RFID reader scan records (read + CSV export).
  - name: Mapping
    description: Floors, geofences, routes, route versions, waypoints, calibration sessions, fingerprints, radio-map publish/status, and live/historical tracking.
paths:
  /whoami:
    x-apps:
      - shared
    get:
      operationId: getWhoAmI
      summary: Resolve the authenticated principal
      description: Returns the authenticated principal (a Cognito user or an org-scoped API token) and its resolved org scope, scope identity, and effective permissions. Response uses the `{ data }` envelope.
      tags:
        - Auth
      responses:
        '200':
          description: The authenticated principal and its resolved access.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WhoAmIEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/scopes:
    x-apps:
      - shared
    get:
      operationId: listScopes
      summary: List the authorization scope catalog
      description: Returns the scope/permission catalog used to build grants. Response shape is PROVISIONAL.
      tags:
        - Auth
      responses:
        '200':
          description: The scope catalog (provisional shape).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    additionalProperties: true
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/otp/request:
    x-apps:
      - shared
    post:
      operationId: requestOtp
      summary: Request an OTP code
      description: Request a one-time passcode (email-only for now) for an OTP-gated org/user. Request and response shapes are PROVISIONAL.
      tags:
        - Auth
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
              additionalProperties: true
      responses:
        '200':
          description: OTP requested (provisional shape).
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/otp/verify:
    x-apps:
      - shared
    post:
      operationId: verifyOtp
      summary: Verify an OTP code
      description: 'Verify a one-time passcode and obtain an `otp_session` (sent on subsequent requests via `X-Otp-Session` or `Authorization: Bearer otp:<session>`). Request and response shapes are PROVISIONAL.'
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
              additionalProperties: true
      responses:
        '200':
          description: OTP verified; session issued (provisional shape).
          content:
            application/json:
              schema:
                type: object
                properties:
                  otp_session:
                    type: string
                additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /orgs/{orgID}/scope-tree:
    x-apps:
      - shared
    parameters:
      - name: orgID
        in: path
        required: true
        description: Organization id.
        schema:
          type: string
    get:
      operationId: getOrgScopeTree
      summary: Get the org scope tree
      description: Nested organization -> divisions -> locations -> buildings -> zones tree for scope pickers. Response shape is PROVISIONAL pending confirmation of the hierarchy entities' wire serialization.
      tags:
        - Organizations
      responses:
        '200':
          description: The scope tree (provisional shape).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ScopeTree'
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /media/uploads:
    x-apps:
      - shared
    post:
      operationId: requestMediaUpload
      summary: Request a pre-signed media upload
      description: Returns a `media_id` + pre-signed `upload_url`. PUT the bytes to that URL with the returned `headers`, then call the complete endpoint.
      tags:
        - Media
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MediaUploadRequest'
      responses:
        '201':
          description: Upload slot created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaUploadEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /media/uploads/{mediaID}/complete:
    x-apps:
      - shared
    parameters:
      - name: mediaID
        in: path
        required: true
        description: The media_id returned by the upload request.
        schema:
          type: string
    post:
      operationId: completeMediaUpload
      summary: Mark a media upload complete
      description: Call after the client PUTs the bytes to the presigned URL; promotes the asset to READY.
      tags:
        - Media
      responses:
        '200':
          description: The finalized media asset.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAssetEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /media/{mediaID}:
    x-apps:
      - shared
    parameters:
      - name: mediaID
        in: path
        required: true
        description: Media asset id.
        schema:
          type: string
    get:
      operationId: getMedia
      summary: Get a media asset
      description: Fetch a media asset record, including a signed `url` once READY.
      tags:
        - Media
      responses:
        '200':
          description: The media asset.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaAssetEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /users/me:
    x-apps:
      - shared
    get:
      operationId: getMe
      summary: Get the current user
      description: The authenticated principal's own user record.
      tags:
        - Users
      responses:
        '200':
          description: The current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      operationId: updateMe
      summary: Update the current user
      description: Self-service profile update for the authenticated user.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
      responses:
        '200':
          description: The updated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/me/avatar:
    x-apps:
      - shared
    put:
      operationId: updateMyAvatar
      summary: Set the current user's avatar
      description: Attach a previously uploaded media asset as the caller's avatar.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - media_id
              properties:
                media_id:
                  type: string
                  description: A READY media asset to use as the avatar.
      responses:
        '200':
          description: The updated user (avatar attached).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /users/me/settings:
    x-apps:
      - shared
    get:
      operationId: getUserSettings
      summary: Get the current user's settings
      description: Per-user UI/preference settings.
      tags:
        - Users
      responses:
        '200':
          description: The user's settings.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/UserSettings'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      operationId: updateUserSettings
      summary: Update the current user's settings
      description: Update per-user UI/preference settings.
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSettingsUpdateRequest'
      responses:
        '200':
          description: The updated settings.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    $ref: '#/components/schemas/UserSettings'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /orgs/{orgID}/divisions:
    x-apps:
      - shared
    parameters:
      - name: orgID
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: listDivisions
      summary: List divisions
      description: Divisions for an org.
      tags:
        - Org Hierarchy
      responses:
        '200':
          description: Divisions.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Division'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /orgs/{orgID}/locations:
    x-apps:
      - shared
    parameters:
      - name: orgID
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: listLocations
      summary: List locations
      description: Locations for an org.
      tags:
        - Org Hierarchy
      responses:
        '200':
          description: Locations.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Location'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /orgs/{orgID}/buildings:
    x-apps:
      - shared
    parameters:
      - name: orgID
        in: path
        required: true
        schema:
          type: string
    get:
      operationId: listBuildings
      summary: List buildings
      description: Buildings for an org.
      tags:
        - Org Hierarchy
      responses:
        '200':
          description: Buildings.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Building'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /devices:
    x-apps:
      - shared
    get:
      operationId: listDevices
      summary: List devices
      description: Keyset-paginated, server-sorted list of registered devices. `name` is a free-text match across label/model/mac/serial/rfid/type/status/state.
      tags:
        - Devices
      parameters:
        - name: org_id
          in: query
          description: Scope to an organization.
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/IncludeCount'
        - name: name
          in: query
          description: Free-text match across label/model/mac/serial/rfid/type/status/state.
          schema:
            type: string
        - name: type
          in: query
          description: Comma-separated device type filter (IN-list).
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: division_id
          in: query
          schema:
            type: string
        - name: location_id
          in: query
          schema:
            type: string
        - name: building_id
          in: query
          schema:
            type: string
        - name: zone_id
          in: query
          schema:
            type: string
        - name: station_id
          in: query
          schema:
            type: string
        - name: expand
          in: query
          description: 'Comma-separated: stats (reader rolling swipe counts).'
          schema:
            type: string
      responses:
        '200':
          description: A page of devices.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /devices/{id}:
    x-apps:
      - shared
    parameters:
      - name: id
        in: path
        required: true
        description: Device id.
        schema:
          type: string
    get:
      operationId: getDevice
      summary: Get a device
      description: Fetch a single device. Returns `ETag` (device version) for optimistic concurrency on PATCH.
      tags:
        - Devices
      responses:
        '200':
          description: The device.
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /visitors:
    x-apps:
      - visitor
    get:
      operationId: listVisitors
      summary: List visitors
      description: Keyset-paginated, server-sorted list of visitors for an org. Follows the shared Pagination & Sort Contract. Each item's `host_contact` is hydrated from the live host_contacts row when linked.
      tags:
        - Visitors
      parameters:
        - name: org_id
          in: query
          required: true
          description: Organization to scope the list to.
          schema:
            type: string
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: sort
          in: query
          description: 'Default `-updated_at`. Allowed: created_at, updated_at, first_name, last_name, reviewed_at, company.'
          schema:
            type: string
        - $ref: '#/components/parameters/IncludeCount'
        - name: status
          in: query
          description: Comma-separated status filter (IN-list).
          schema:
            type: string
        - name: name
          in: query
          description: ILIKE across first_name / last_name / email.
          schema:
            type: string
        - name: type
          in: query
          description: Comma-separated visitor type (IN-list).
          schema:
            type: string
        - name: company
          in: query
          description: Exact case-insensitive match (comma-separated for IN-list); use `company_match=like` for substring.
          schema:
            type: string
        - name: company_match
          in: query
          description: '`exact` (default) or `like` (ILIKE substring).'
          schema:
            type: string
            enum:
              - exact
              - like
        - name: include_deleted
          in: query
          schema:
            type: boolean
        - name: reviewer_id
          in: query
          schema:
            type: string
        - name: reviewed_after
          in: query
          schema:
            type: string
            format: date-time
        - name: reviewed_before
          in: query
          schema:
            type: string
            format: date-time
        - name: has_active_breach
          in: query
          description: Visitors whose active visit is breached. Gated by GEOFENCE_DETECTION_ENABLED.
          schema:
            type: boolean
        - name: ever_breached
          in: query
          description: Visitors with at least one historical breached visit.
          schema:
            type: boolean
        - name: expand
          in: query
          description: 'Comma-separated: company_logo, host_contact, geofence_status, geofence_stats.'
          schema:
            type: string
      responses:
        '200':
          description: A page of visitors.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitorListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createVisitor
      summary: Create a visitor
      description: Create (or non-blockingly reuse) a visitor. Identity resolution can reuse a faceless existing record (`200`) or create + queue a merge candidate (`201`). See api-spec.md for the three response branches and reuse-patch policy. `Idempotency-Key` supported.
      tags:
        - Visitors
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: UUID to make the create idempotent across retries.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVisitorRequest'
      responses:
        '200':
          description: Reused an existing faceless visitor record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitorCreateResponse'
        '201':
          description: Created a new visitor (possibly with a merge candidate queued).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitorCreateResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
  /visitors/bulk:
    x-apps:
      - visitor
    post:
      operationId: bulkCreateVisitors
      summary: Bulk-import visitors from CSV
      description: 'Multipart CSV upload (field `file`). Per-row hooks: visitor-type validation, E.164 phone composition, picture/logo URL fetch (non-fatal), host-contact upsert. Picture/logo failures land in `rows[].warnings`. See api-spec.md for the canonical column set and aliases. Min role: location_admin.'
      tags:
        - Visitors
      parameters:
        - name: org_id
          in: query
          required: true
          schema:
            type: string
        - name: Idempotency-Key
          in: header
          required: true
          description: UUID — required for bulk import.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV with the canonical visitor columns.
      responses:
        '200':
          description: Per-row import report (rows may individually succeed or be rejected).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkCreateReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /visitors/bulk/template:
    x-apps:
      - visitor
    get:
      operationId: getVisitorBulkTemplate
      summary: Download the visitor bulk-import CSV template
      description: 'Returns a CSV with the canonical column headers and one example row keyed off the org''s first effective visitor type. The `X-Visitor-Types` response header echoes the effective list. Min role: location_admin.'
      tags:
        - Visitors
      parameters:
        - name: org_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: CSV template.
          headers:
            X-Visitor-Types:
              description: Comma-separated effective visitor types for the org.
              schema:
                type: string
            Content-Disposition:
              schema:
                type: string
              example: attachment; filename="visitors-bulk-template.csv"
          content:
            text/csv:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /visitors/{id}:
    x-apps:
      - visitor
    parameters:
      - name: id
        in: path
        required: true
        description: Visitor id.
        schema:
          type: string
    get:
      operationId: getVisitor
      summary: Get a visitor
      description: Fetch a single visitor. Returns `ETag` (the visitor version) for optimistic concurrency on PATCH.
      tags:
        - Visitors
      parameters:
        - name: expand
          in: query
          description: 'Comma-separated: company_logo, host_contact, geofence_status, geofence_stats.'
          schema:
            type: string
      responses:
        '200':
          description: The visitor.
          headers:
            ETag:
              description: Current visitor version; pass back as `If-Match` on PATCH.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitorEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateVisitor
      summary: Update a visitor
      description: Partial update. Supports an inline `host_contact` upsert (requires email or phone) and `company_logo_url` ingestion. Pass `If-Match` with the visitor's current version for optimistic concurrency.
      tags:
        - Visitors
      parameters:
        - name: If-Match
          in: header
          required: false
          description: Visitor version (ETag) for optimistic concurrency.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VisitorWrite'
      responses:
        '200':
          description: The updated visitor (host_contact echoed from the live row when upserted).
          headers:
            ETag:
              description: New visitor version.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VisitorEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      operationId: deleteVisitor
      summary: Soft-delete a visitor
      description: 'Soft delete. Deleted visitors are treated as not-found in identify/check-in lookups. Min role: location_admin.'
      tags:
        - Visitors
      responses:
        '204':
          description: Visitor soft-deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /visitors/{id}/photos:
    x-apps:
      - visitor
    parameters:
      - name: id
        in: path
        required: true
        description: Visitor id.
        schema:
          type: string
