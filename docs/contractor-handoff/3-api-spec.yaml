        country:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        geo_source:
          type: string
        geo_updated_at:
          type: string
          format: date-time
        meta:
          type: object
          additionalProperties: true
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Location:
      type: object
      title: Location
