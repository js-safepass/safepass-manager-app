<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafePass Manager — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #1c2033;
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        text-align: center;
      }
      main { padding: 24px; }
      h1 { font-size: 1.6rem; margin: 0 0 12px; font-weight: 600; }
      p { margin: 0; opacity: 0.85; line-height: 1.5; }
    </style>
  </head>
  <body>
    <!-- Capacitor server.errorPath fallback: shown by the native shell when
         https://manage.safepass.com is unreachable (no network, DNS failure).
         The shell retries the remote URL on next launch/foreground. -->
    <main>
      <h1>SafePass Manager is offline</h1>
      <p>Check the device's internet connection, then reopen the app.</p>
    </main>
  </body>
</html>
