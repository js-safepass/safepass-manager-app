    Notification:
      type: object
      title: Notification
      description: A user-scoped notification (snake_case; from the json-tagged core struct, list + SSE).
      required:
        - id
        - type
        - severity
        - title
        - status
        - created_at
      properties:
        id:
          type: string
        org_id:
          type: string
