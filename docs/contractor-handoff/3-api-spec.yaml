        - updated_at
      properties:
        id:
          type: string
        organization_id:
          type: string
        location_id:
          type: string
        division_id:
          type: string
        external_key:
          type: string
        name:
          type: string
        slug:
          type: string
        logo_media_id:
          type: string
        kind:
          type: string
        status:
          type: string
        address_line1:
          type: string
        address_line2:
          type: string
        city:
          type: string
        state:
          type: string
        postal_code:
          type: string
        country:
          type: string
        timezone:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        geo_source:
          type: string
        geo_updated_at:
          type: string
          format: date-time
        meta:
          type: object
          additionalProperties: true
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    GeofenceStatus:
      type: object
      title: GeofenceStatus
      description: Live containment snapshot for a visit's device as of the most recent solve (dto.GeofenceStatusOut). Feature name/rating/floor are denormalized so the FE can render without a second geofence fetch.
      required:
        - inside_features
        - observed_at
      properties:
        inside_features:
          type: array
          description: Features the device is currently inside. Empty when observed but inside none.
          items:
            type: object
            required:
              - geofence_id
              - feature_id
            properties:
              floor_id:
                type: string
              geofence_id:
                type: string
              feature_id:
                type: string
              name:
                type: string
              rating:
                type: string
                description: 'Severity scale: informational < low < medium < high < critical.'
        observed_at:
          type: string
          format: date-time
    Device:
      type: object
      title: Device
      description: A registered device (badge / reader / camera / dock / smart_dock / station). Mirrors dto.DeviceOut. `state_code`/`state_label` are computed display state (LWT connectivity overlaid on the device-reported state). Sensitive IoT fields (thing_name, cert_id, secret_arn, shadow_cache, provisioning_id) are returned to system_admin only.
      required:
        - id
        - org_id
        - type
        - status
        - version
        - created_at
        - updated_at
      properties:
        id:
          type: string
        org_id:
          type: string
        label:
          type: string
        model:
          type: string
        mac_id:
          type: string
        serial:
          type: string
        rfid:
          type: string
          description: Present on badge/vendor_badge devices. Write is system_admin only.
        type:
          type: string
          description: 'Device type: badge, vendor_badge, reader, camera, dock, smart_dock, station.'
        status:
          type: string
        state_code:
          type: integer
          description: Computed display state code (connectivity overlaid on reported state).
        state_label:
          type: string
        state:
          type: string
        in_dock:
          type:
            - boolean
            - 'null'
        battery_pct:
          type: integer
          description: Derived from voltage via the Li-ion curve (firmware reports voltage only).
        battery_volt:
          type: number
        battery_low:
          type: boolean
        charging:
          type: boolean
        thing_name:
          type: string
          description: system_admin only.
        thing_group:
          type: string
          description: system_admin only.
        thing_groups:
          type: array
          items:
            type: string
        firmware_version:
          type: string
        cert_id:
          type: string
          description: system_admin only.
        secret_arn:
          type: string
          description: system_admin only.
        shadow_cache:
          type: object
          description: system_admin only.
          additionalProperties: true
        last_seen_at:
          type: string
          format: date-time
        shadow_refreshed_at:
          type: string
          format: date-time
        conn_status:
          type: boolean
          description: LWT connectivity signal.
        conn_disconnect_reason:
          type: string
        conn_last_connected_at:
          type: string
          format: date-time
        conn_last_disconnected_at:
          type: string
          format: date-time
        provisioning_id:
          type: string
          description: system_admin only.
        provisioning_required:
          type: boolean
        division_id:
          type: string
        location_id:
          type: string
        building_id:
          type: string
        zone_id:
          type: string
        station_id:
          type: string
        meta:
          type: object
          additionalProperties: true
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        geofence_status:
          $ref: '#/components/schemas/GeofenceStatus'
        stats:
          type: object
          description: Per-reader rolling swipe counts. Only on readers with `?expand=stats`.
          properties:
            swipes_last_1h:
              type: integer
            swipes_last_24h:
              type: integer
            swipes_last_7d:
              type: integer
    PageMeta:
      type: object
      title: PageMeta
      description: Pagination metadata returned in the `meta` object of keyset-paginated list responses.
      properties:
        cursor:
          type: string
          description: Opaque cursor for the next page, bound to the active sort. Omitted on the last page (the canonical "no more pages" signal). Treat as opaque.
        sort:
          type: string
          description: Canonical applied sort, including the server-appended `id` tie-breaker.
          examples:
            - '-updated_at,id'
        limit:
          type: integer
          description: Effective page size applied to this response.
          examples:
            - 50
        total_count:
          type: integer
          description: Exact COUNT(*) over the page's filter set. Present only when `?include_count=1` was sent AND the endpoint allows count.
    DeviceListResponse:
      type: object
      title: DeviceListResponse
      description: Keyset-paginated page of devices.
      required:
        - data
        - meta
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Device'
        meta:
          $ref: '#/components/schemas/PageMeta'
        links:
          type: object
          properties:
            self:
              type: string
        includes:
          type: object
          additionalProperties: true
    DeviceEnvelope:
      type: object
      title: DeviceEnvelope
      description: '`{ data }` envelope wrapping a single Device.'
      required:
        - data
      properties:
        data:
          $ref: '#/components/schemas/Device'
    HostContact:
      type: object
      title: HostContact
      description: Inline host-contact payload (dto.HostContactIn). Used both as a nested write body on visitor create/patch and as the hydrated host block on responses. Requires `email` or `phone` when provided as a write.
      properties:
        name:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        country_code:
          type: string
        notify_via:
          type: string
          enum:
            - email
            - sms
            - both
        notify_on_checkin:
          type: boolean
        company:
          type: string
        company_address:
          type: string
        company_logo_media_id:
          type: string
        host_user_id:
          type: string
          description: Optional mapping to a SafePass user.
        dedupe_mode:
          type: string
          description: Host-contact conflict handling on write.
          enum:
            - conflict_on_diff
            - merge
            - overwrite
        meta:
          type: object
          additionalProperties: true
    Visitor:
      type: object
      title: Visitor
      description: A visitor identity row (org-scoped). Location lives on the visit, not the visitor. Mirrors dto.VisitorOut.
      required:
        - id
        - organization_id
        - first_name
        - last_name
        - has_face_id
        - version
        - created_at
        - updated_at
      properties:
        id:
          type: string
        organization_id:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        status:
          type: string
        type:
          type: string
          description: Visitor type. Validated against the org's `visitor_types` when enabled.
        notes:
          type: string
        employee_id:
          type: string
        photo_media_id:
          type: string
        photo_url:
          type: string
          description: Signed URL, present when `photo_media_id` is set.
        has_face_id:
          type: boolean
          description: Computed as `current_face_id != ""`. Always returned.
        reviewer_id:
          type: string
        review_comment:
          type: string
        reviewed_at:
          type: string
          format: date-time
        company:
          type: string
        company_address:
          type: string
        company_logo_media_id:
          type: string
        company_logo_url:
          type: string
          description: Signed URL; expand-gated via `?expand=company_logo`.
        host_type:
          type: string
          enum:
            - none
            - safepass
            - contact
        host_user_id:
          type: string
          description: Set when the host is a SafePass user (host_type=safepass).
        host_contact_id:
          type: string
          description: Authoritative FK to the canonical host_contacts row. The nested `host_contact` object is a snapshot; dereference `includes.host_contacts[id]` for live data.
        host_contact:
          $ref: '#/components/schemas/HostContact'
        version:
          type: integer
          description: Optimistic-concurrency version; surfaced as the ETag.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
        delete_reason:
          type: string
        meta:
          type: object
          additionalProperties: true
        geofence_summary:
          type: object
          description: At-a-glance detection state. Gated by GEOFENCE_DETECTION_ENABLED; omitted entirely when all-zero.
          properties:
            current_severity:
              type: string
              description: Highest rating of currently-inside features; empty when none/no active visit.
              enum:
                - ''
                - informational
                - low
                - medium
                - high
                - critical
            current_visit_breached:
              type: boolean
            lifetime_visits_with_breach:
              type: integer
        geofence_status:
          type: object
          description: Live containment of the active visit. Only when `?expand=geofence_status`.
          properties:
            inside_features:
              type: array
              items:
                type: object
                properties:
                  geofence_id:
                    type: string
                  feature_id:
                    type: string
                  name:
                    type: string
                  rating:
                    type: string
            observed_at:
              type: string
              format: date-time
        geofence_stats:
          type: object
          description: Aggregate breach history. Only when `?expand=geofence_stats`.
          properties:
            lifetime_breach_events:
              type: integer
            lifetime_visits_with_breach:
              type: integer
            last_breach_at:
              type: string
              format: date-time
