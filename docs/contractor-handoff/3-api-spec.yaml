  responses:
    Unauthorized:
      description: Authentication required or failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            unauthorized:
              value:
                title: Unauthorized
                status: 401
                detail: Authentication required.
                code: UNAUTHORIZED
    BadRequest:
      description: Invalid request — a query/filter/pagination param is malformed or out of range. `code` carries the stable reason (e.g. `invalid_sort`, `invalid_cursor`, `cursor_sort_mismatch`, `invalid_limit`, `invalid_filter`).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            invalid_sort:
              value:
                title: Bad Request
                status: 400
                detail: 'Unknown sort column: foo'
                code: invalid_sort
    NotFound:
      description: Resource not found. Also returned on read paths when the caller lacks org scope, to avoid leaking resource existence.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            not_found:
              value:
                title: Not Found
                status: 404
                detail: The requested resource does not exist.
                code: NOT_FOUND
    Forbidden:
      description: Authenticated, but not authorized for this resource or operation.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
          examples:
            forbidden:
              value:
                title: Forbidden
                status: 403
                detail: You do not have access to this resource.
                code: FORBIDDEN
    Conflict:
      description: Uniqueness or dedupe conflict. On visitor create/patch with an inline host contact, the existing contact payload is returned alongside the error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Problem'
  parameters:
    Limit:
      name: limit
      in: query
      required: false
      description: Page size. Default 50, max 200. Out of range -> 400 `invalid_limit`.
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    Cursor:
      name: cursor
      in: query
      required: false
      description: Opaque pagination cursor, bound to the active sort. Omit on the first page. A cursor minted under a different sort -> 400 `cursor_sort_mismatch`; malformed -> 400 `invalid_cursor`. Do not introspect.
      schema:
        type: string
    Sort:
      name: sort
      in: query
      required: false
      description: '`col` for ASC, `-col` for DESC. The `id` ASC tie-breaker is appended server-side; clients must not include it. Unknown column -> 400 `invalid_sort`.'
      schema:
        type: string
    IncludeCount:
      name: include_count
      in: query
      required: false
      description: Opt in to `meta.total_count`. `1` returns the exact COUNT(*). `approximate` is reserved and currently -> 400 `count_approximate_not_implemented`.
      schema:
        type: string
        enum:
          - '1'
          - approximate
  headers:
    XResourceStatus:
      description: Machine-readable status returned on a 204 when a resource is valid but unpopulated (e.g. `not-configured`, `no-data`).
      schema:
        type: string
