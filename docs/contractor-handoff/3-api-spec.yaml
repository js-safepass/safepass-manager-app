    x-apps:
      - visitor
    parameters:
      - name: id
        in: path
        required: true
        description: Visit id.
        schema:
          type: string
    get:
      operationId: listVisitEvents
      summary: List a visit's timeline events
      description: |-
        Keyset-paginated visit timeline (`device.status`, check-in transitions, geofence transitions, etc.). This endpoint disallows `?include_count` (count-not-supported). Optional `?type=` filters to a single event type.

        Event types include the lifecycle transitions plus the geofence detection pair (emitted by `runGeofenceDetection` at solve ingest):
        - `geofence_entry` — the visit's badge entered a geofence feature.
        - `geofence_exit` — the visit's badge left a geofence feature; also flips the
          sticky `flags.geofence_breach` on the visit and may fire a
          `host.geofence_breach` notification.


        For `geofence_entry` / `geofence_exit`, the `payload` matches `GeofenceEventPayload`. First-observation is suppressed (a badge that fires its first solve already inside a zone emits no `enter` event).
      tags:
        - Visits
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - name: type
          in: query
          description: Filter to a single event type (e.g. `geofence_exit`).
          schema:
            type: string
      responses:
        '200':
          description: A page of visit events.
          content:
            application/json:
              schema:
                type: object
                required:
                  - data
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      description: A visit-timeline event. `additionalProperties` is open because the event set is heterogeneous and still expanding.
                      properties:
                        id:
                          type: string
                        visit_id:
                          type: string
                        type:
                          type: string
                          description: 'Event type. Known geofence values: `geofence_entry`, `geofence_exit`. Other lifecycle/device types also appear here.'
                        actor_id:
                          type: string
                        actor_type:
                          type: string
                          description: e.g. `system` for detector-emitted geofence events.
                        payload:
                          description: Type-specific data. For `geofence_entry` / `geofence_exit` this conforms to `GeofenceEventPayload`; other event types carry their own open object.
                          anyOf:
                            - $ref: '#/components/schemas/GeofenceEventPayload'
                            - type: object
                              additionalProperties: true
                        occurred_at:
                          type: string
                          format: date-time
                          description: When the event occurred (the solve timestamp for geofence events, not the row's write time).
                        created_at:
                          type: string
                          format: date-time
                      additionalProperties: true
                  meta:
                    $ref: '#/components/schemas/PageMeta'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
