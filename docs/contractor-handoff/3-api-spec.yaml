      description: Non-mutating gate check for a front-desk check-in. Validates org/location/ building scope and runs the same blockers as submit (in-progress / already checked-in, review required, availability, queue capacity, badge availability) WITHOUT creating a visit. Use it to drive the Check-In button state. A `200` means the gates currently pass — it is not a reservation.
